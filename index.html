        // ========== 训练控制器 ==========
        let durationInterval = null;

        function startTraining() {
            // 检查是否选择了计划
            const selectedPlanId = planManager.currentPlanId;
            if (selectedPlanId) {
                // 加载计划执行队列
                const success = planExecutionState.loadPlan(selectedPlanId);
                if (!success) {
                    alert('计划加载失败，请检查计划配置！');
                    return;
                }
                // 设置初始模式
                const firstExecution = planExecutionState.getCurrentExecution();
                if (firstExecution) {
                    appState.currentDirection = firstExecution.type;
                    // 应用计划中的参数
                    if (firstExecution.speed !== undefined) {
                        appState.modeConfigs[firstExecution.type].speed = firstExecution.speed;
                    }
                    if (firstExecution.interval !== undefined) {
                        appState.modeConfigs[firstExecution.type].interval = firstExecution.interval;
                    }
                    if (firstExecution.duration !== undefined) {
                        appState.modeConfigs[firstExecution.type].duration = firstExecution.duration;
                    }
                }
            } else {
                // 清除计划模式，使用普通模式
                planExecutionState.clearPlan();
            }
            
            appState.isRunning = true;
            appState.isPaused = false;
            startBtn.innerHTML = SVGIcons.pause;
            startBtn.title = '暂停';
            fullscreenStartBtn.innerHTML = SVGIcons.pause;
            fullscreenStartBtn.title = '暂停';
            
            if (!appState.statistics.sessionStart) {
                appState.statistics.sessionStart = Date.now();
            }
            
            updateDirectionIndicator();
            
            // 如果使用计划模式，显示计划进度
            if (planExecutionState.isUsingPlan()) {
                updatePlanProgressDisplay();
            }
            
            playSound('start');
            startAnimation();
            startDurationCounter();
        }

        function pauseTraining() {
            appState.isRunning = false;
            appState.isPaused = true;
            startBtn.innerHTML = SVGIcons.play;
            startBtn.title = '开始';
            fullscreenStartBtn.innerHTML = SVGIcons.play;
            fullscreenStartBtn.title = '开始';
            
            // 更新累计时长
            if (appState.statistics.sessionStart) {
                const sessionDuration = Math.floor((Date.now() - appState.statistics.sessionStart) / 1000);
                appState.statistics.totalDuration += sessionDuration;
                appState.statistics.sessionStart = null;
                saveStatistics();
            }
            
            playSound('pause');
            cancelAnimationFrame(animationFrameId);
            stopDurationCounter();
        }

        function startDurationCounter() {
            stopDurationCounter(); // 清除可能存在的旧计时器
            
            durationInterval = setInterval(() => {
                if (appState.isRunning && appState.statistics.sessionStart) {
                    const sessionDuration = Math.floor((Date.now() - appState.statistics.sessionStart) / 1000);
                    const totalDuration = appState.statistics.totalDuration + sessionDuration;
                    
                    const minutes = Math.floor(totalDuration / 60);
                    const seconds = totalDuration % 60;
                    trainDuration.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                }
            }, 1000);
        }

        function stopDurationCounter() {
            if (durationInterval) {
                clearInterval(durationInterval);
                durationInterval = null;
            }
        }

        function updateDirectionIndicator() {
            const dir = TrainingConfig.directions[appState.currentDirection];
            directionIndicator.innerHTML = `${dir.icon} ${dir.name}方向`;
            currentDirectionEl.innerHTML = `${dir.icon} ${dir.name}`;
        }

        function updateStatisticsDisplay() {
            // 使用动画效果更新计数
            animateCount(trainCount, parseInt(trainCount.textContent) || 0, appState.statistics.totalCount);
            
            const duration = appState.statistics.totalDuration;
            const minutes = Math.floor(duration / 60);
            const seconds = duration % 60;
            trainDuration.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function animateCount(element, start, end) {
            if (start === end) return;
            
            const duration = 500; // 动画持续时间
            const startTime = Date.now();
            
            function update() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const current = Math.floor(start + (end - start) * easeOutQuad(progress));
                
                element.textContent = current;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            
            update();
        }

        function easeOutQuad(t) {
            return t * (2 - t);
        }

        // ========== Canvas动画引擎 ==========
        let animationFrameId;
        let animationState = {
            startTime: null,
            currentSegment: 0,
            trailPoints: []
        };

        function startAnimation() {
            animationState.startTime = Date.now();
            animationState.currentSegment = 0;
            animationState.trailPoints = [];
            animate();
        }

        function animate() {
            if (!appState.isRunning) return;

            const now = Date.now();
            const elapsed = now - animationState.startTime;
            const direction = TrainingConfig.directions[appState.currentDirection];
            const path = direction.path;
            const adjustedDuration = TrainingConfig.moveDuration / appState.settings.speed;

            // ==================== 随机位置模式 ====================
            if (appState.currentDirection === 'random') {
                const margin = 100;
                const safeWidth = canvas.width - margin * 2;
                const safeHeight = canvas.height - margin * 2;

                // 检查是否需要跳转（使用配置的间隔时间）
                const randomInterval = (appState.modeConfigs.random?.interval || 3) * 1000;
                if (now - appState.specialModeState.random.lastJumpTime > randomInterval) {
                    appState.specialModeState.random.lastJumpTime = now;
                    // 生成新的随机位置
                    animationState.randomX = margin + Math.random() * safeWidth;
                    animationState.randomY = margin + Math.random() * safeHeight;
                }

                // 如果没有初始位置，随机生成一个
                if (!animationState.randomX) {
                    animationState.randomX = margin + Math.random() * safeWidth;
                    animationState.randomY = margin + Math.random() * safeHeight;
                }

                const x = animationState.randomX;
                const y = animationState.randomY;

                // 添加轨迹点
                if (appState.settings.showTrail) {
                    animationState.trailPoints.push({ x, y });
                    if (animationState.trailPoints.length > 50) {
                        animationState.trailPoints.shift();
                    }
                }

                drawFrame(x, y);

                // 检查是否达到模式持续时间
                const modeConfig = appState.modeConfigs[appState.currentDirection];
                const modeDuration = (modeConfig?.duration || 15) * 1000;
                if (elapsed >= modeDuration) {
                    onDirectionComplete();
                    return;
                }
            }
            // ==================== 物理反弹模式 ====================
            else if (appState.currentDirection === 'bounce') {
                const margin = appState.settings.iconSize;
                const safeWidth = canvas.width - margin * 2;
                const safeHeight = canvas.height - margin * 2;

                // 初始化速度向量
                if (!appState.specialModeState.bounce.vx || !animationState.bounceInitialized) {
                    animationState.bounceInitialized = true;
                    const speed = (appState.modeConfigs.bounce?.speed || 2) * appState.settings.speed;
                    // 随机角度（避开水平和垂直方向）
                    let angle;
                    do {
                        angle = Math.random() * Math.PI * 2;
                    } while (Math.abs(Math.cos(angle)) < 0.2 || Math.abs(Math.sin(angle)) < 0.2);

                    appState.specialModeState.bounce.vx = Math.cos(angle) * speed;
                    appState.specialModeState.bounce.vy = Math.sin(angle) * speed;
                    animationState.bounceX = canvas.width / 2;
                    animationState.bounceY = canvas.height / 2;
                }

                // 更新位置
                animationState.bounceX += appState.specialModeState.bounce.vx;
                animationState.bounceY += appState.specialModeState.bounce.vy;

                // 边界碰撞检测和反弹
                if (animationState.bounceX <= margin) {
                    animationState.bounceX = margin;
                    appState.specialModeState.bounce.vx = Math.abs(appState.specialModeState.bounce.vx);
                } else if (animationState.bounceX >= canvas.width - margin) {
                    animationState.bounceX = canvas.width - margin;
                    appState.specialModeState.bounce.vx = -Math.abs(appState.specialModeState.bounce.vx);
                }

                if (animationState.bounceY <= margin) {
                    animationState.bounceY = margin;
                    appState.specialModeState.bounce.vy = Math.abs(appState.specialModeState.bounce.vy);
                } else if (animationState.bounceY >= canvas.height - margin) {
                    animationState.bounceY = canvas.height - margin;
                    appState.specialModeState.bounce.vy = -Math.abs(appState.specialModeState.bounce.vy);
                }

                const x = animationState.bounceX;
                const y = animationState.bounceY;

                // 添加轨迹点
                if (appState.settings.showTrail) {
                    animationState.trailPoints.push({ x, y });
                    if (animationState.trailPoints.length > 100) {
                        animationState.trailPoints.shift();
                    }
                }

                drawFrame(x, y);

                // 检查是否达到模式持续时间
                const modeConfig = appState.modeConfigs[appState.currentDirection];
                const modeDuration = (modeConfig?.duration || 15) * 1000;
                if (elapsed >= modeDuration) {
                    animationState.bounceInitialized = false;
                    onDirectionComplete();
                    return;
                }
            }
            // ==================== 普通轨迹模式 ====================
            else if (appState.currentDirection.startsWith('figure8')) {
                const modeSpeed = appState.modeConfigs[appState.currentDirection]?.speed || 1;
                const adjustedFigure8Duration = TrainingConfig.figure8Duration / (appState.settings.speed * modeSpeed);
                const progress = (elapsed % adjustedFigure8Duration) / adjustedFigure8Duration;
                const pathIndex = Math.floor(progress * (path.length - 1));
                const segmentProgress = (progress * (path.length - 1)) % 1;
                
                const currentPoint = path[pathIndex];
                const nextPoint = path[(pathIndex + 1) % path.length];
                
                // 全屏模式下使用完整屏幕范围，让轨迹真正到达边缘
                const isFullscreen = document.body.classList.contains('fullscreen');
                const margin = isFullscreen ? 0 : 100; // 全屏时无边距，轨迹到达屏幕边缘
                const safeWidth = canvas.width - margin * 2;
                const safeHeight = canvas.height - margin * 2;
                
                const x = canvas.width / 2 + (currentPoint[0] + (nextPoint[0] - currentPoint[0]) * segmentProgress) * safeWidth / 2;
                const y = canvas.height / 2 + (currentPoint[1] + (nextPoint[1] - currentPoint[1]) * segmentProgress) * safeHeight / 2;

                // 添加轨迹点
                if (appState.settings.showTrail) {
                    animationState.trailPoints.push({ x, y });
                    if (animationState.trailPoints.length > 150) {
                        animationState.trailPoints.shift();
                    }
                }

                drawFrame(x, y);

                // 检查是否完成一个完整的8字
                if (elapsed >= adjustedFigure8Duration) {
                    onDirectionComplete();
                    return;
                }
            } else {
                // 线性轨迹逻辑 - 简化版本，确保连续性
                const adjustedPause = TrainingConfig.pauseDuration / appState.settings.speed;
                
                // 为每个路径段分配时间和类型
                const segments = [];
                let totalTime = 0;
                
                for (let i = 0; i < path.length - 1; i++) {
                    const start = path[i];
                    const end = path[i + 1];
                    const isMovementSegment = (start[0] !== end[0] || start[1] !== end[1]);
                    
                    segments.push({
                        pathIndex: i,
                        startPoint: start,
                        endPoint: end,
                        isMoving: isMovementSegment,
                        duration: isMovementSegment ? adjustedDuration : adjustedPause,
                        startTime: totalTime,
                        endTime: totalTime + (isMovementSegment ? adjustedDuration : adjustedPause)
                    });
                    
                    totalTime += (isMovementSegment ? adjustedDuration : adjustedPause);
                }

                // 找到当前段
                let currentSegment = null;
                for (let i = 0; i < segments.length; i++) {
                    if (elapsed >= segments[i].startTime && elapsed < segments[i].endTime) {
                        currentSegment = segments[i];
                        break;
                    }
                }

                // 检查是否完成整个循环
                if (!currentSegment || elapsed >= totalTime) {
                    onDirectionComplete();
                    return;
                }

                // 计算当前段内的进度
                const segmentElapsed = elapsed - currentSegment.startTime;
                const segmentProgress = segmentElapsed / currentSegment.duration;
                
                // 计算当前位置
                let x, y;
                
                if (currentSegment.isMoving) {
                    // 运动段：线性插值
                    const start = currentSegment.startPoint;
                    const end = currentSegment.endPoint;
                    
                    // 全屏模式下使用完整屏幕范围，窗口模式保持安全边距
                    const isFullscreen = document.body.classList.contains('fullscreen');
                    const margin = isFullscreen ? 0 : 100; // 全屏时无边距，轨迹到达屏幕边缘
                    const safeWidth = canvas.width - margin * 2;
                    const safeHeight = canvas.height - margin * 2;
                    
                    x = canvas.width / 2 + (start[0] + (end[0] - start[0]) * segmentProgress) * safeWidth / 2;
                    y = canvas.height / 2 + (start[1] + (end[1] - start[1]) * segmentProgress) * safeHeight / 2;
                } else {
                    // 停顿段：保持在起始位置
                    const pos = currentSegment.startPoint;
                    const isFullscreen = document.body.classList.contains('fullscreen');
                    const margin = isFullscreen ? 0 : 100; // 全屏时无边距，轨迹到达屏幕边缘
                    x = canvas.width / 2 + pos[0] * (canvas.width - margin * 2) / 2;
                    y = canvas.height / 2 + pos[1] * (canvas.height - margin * 2) / 2;
                }

                // 添加轨迹点（只在运动时添加）
                if (appState.settings.showTrail && currentSegment.isMoving) {
                    animationState.trailPoints.push({ x, y });
                    if (animationState.trailPoints.length > 100) {
                        animationState.trailPoints.shift();
                    }
                }

                // 绘制
                drawFrame(x, y);
            }

            animationFrameId = requestAnimationFrame(animate);
        }

        function drawFrame(x, y) {
            const colors = getDrawingColors();
            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制轨迹线
            if (appState.settings.showTrail && animationState.trailPoints.length > 1) {
                ctx.strokeStyle = colors.trailStroke;
                ctx.lineWidth = 4;
                ctx.setLineDash([12, 6]);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(animationState.trailPoints[0].x, animationState.trailPoints[0].y);
                
                for (let i = 1; i < animationState.trailPoints.length; i++) {
                    const alpha = (i / animationState.trailPoints.length) * 0.8;
                    ctx.globalAlpha = alpha;
                    ctx.lineTo(animationState.trailPoints[i].x, animationState.trailPoints[i].y);
                }
                
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.globalAlpha = 1;
            }

            // 绘制中心点指示
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // 外圆环
            ctx.strokeStyle = colors.centerStroke;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 25, 0, Math.PI * 2);
            ctx.stroke();
            
            // 内圆点
            ctx.fillStyle = colors.centerFill;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
            ctx.fill();

            // 绘制图标外圈光晕（调小）
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, appState.settings.iconSize * 0.8);
            const isDark = appState.settings.backgroundColor === '#2d3748';
            gradient.addColorStop(0, isDark ? 'rgba(74, 222, 128, 0.1)' : 'rgba(16, 185, 129, 0.1)');
            gradient.addColorStop(0.5, isDark ? 'rgba(74, 222, 128, 0.05)' : 'rgba(16, 185, 129, 0.05)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, appState.settings.iconSize * 0.8, 0, Math.PI * 2);
            ctx.fill();

            // 绘制图标阴影（调小）
            const isDarkShadow = appState.settings.backgroundColor === '#2d3748';
            ctx.shadowColor = isDarkShadow ? 'rgba(74, 222, 128, 0.2)' : 'rgba(16, 185, 129, 0.2)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 2;

            // 绘制图标
            ctx.font = `${appState.settings.iconSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = colors.iconText;
            ctx.fillText(appState.settings.selectedIcon, x, y);

            // 重置阴影
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        function easeInOutCubic(t) {
            return t < 0.5
                ? 4 * t * t * t
                : 1 - Math.pow(-2 * t + 2, 3) / 2;
        }

        function onDirectionComplete() {
            // 增加计数
            appState.statistics.totalCount++;
            updateStatisticsDisplay();
            saveStatistics();

            // 如果使用计划模式
            if (planExecutionState.isUsingPlan()) {
                const hasNext = planExecutionState.advanceQueue();
                if (hasNext) {
                    const nextExecution = planExecutionState.getCurrentExecution();
                    appState.currentDirection = nextExecution.type;
                    
                    // 应用当前执行项的参数到全局设置（用于模式配置）
                    if (nextExecution.speed !== undefined) {
                        appState.modeConfigs[nextExecution.type].speed = nextExecution.speed;
                    }
                    if (nextExecution.interval !== undefined) {
                        appState.modeConfigs[nextExecution.type].interval = nextExecution.interval;
                    }
                    if (nextExecution.duration !== undefined) {
                        appState.modeConfigs[nextExecution.type].duration = nextExecution.duration;
                    }
                    
                    updateDirectionIndicator();
                    updatePlanProgressDisplay();
                    playSound('switch');
                } else {
                    // 计划完成
                    stopTraining();
                    showPlanCompleteNotification();
                    return;
                }
            } 
            // 原有的自动模式逻辑
            else if (appState.mode === 'auto') {
                // 获取所有启用的模式
                const enabledModes = appState.directionOrder.filter(key => appState.modeConfigs[key]?.enabled);

                if (enabledModes.length > 0) {
                    // 找到当前模式在启用列表中的索引
                    let currentEnabledIndex = enabledModes.indexOf(appState.currentDirection);

                    // 切换到下一个启用模式
                    const nextEnabledIndex = (currentEnabledIndex + 1) % enabledModes.length;
                    appState.currentDirection = enabledModes[nextEnabledIndex];

                    // 更新directionOrder中的索引，以便手动模式也能同步
                    appState.currentDirectionIndex = appState.directionOrder.indexOf(appState.currentDirection);

                    updateDirectionIndicator();
                    playSound('switch');
                }
            }

            // 重置特殊模式状态
            animationState.bounceInitialized = false;

            // 如果仍在运行,开始下一次动画
            if (appState.isRunning) {
                setTimeout(() => {
                    if (appState.isRunning) {
                        startAnimation();
                    }
                }, 500);
            }
        }

        /**
         * 更新计划进度显示
         */
        function updatePlanProgressDisplay() {
            const progressInfo = planExecutionState.getProgressInfo();
            if (!progressInfo) return;

            const direction = TrainingConfig.directions[progressInfo.modeType];
            if (!direction) return;

            // 更新方向指示器显示进度信息
            const indicator = document.getElementById('directionIndicator');
            if (indicator) {
                indicator.innerHTML = `
                    <div style="font-size: 12px; opacity: 0.9; display: flex; align-items: center; justify-content: center; gap: 4px;">
                        ${SVGIcons.clipboard} ${progressInfo.planName}
                    </div>
                    <div style="font-size: 18px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; margin: 1px 0;">
                        ${direction.icon} ${direction.name}
                    </div>
                    <div style="font-size: 12px; opacity: 0.8;">
                        循环 ${progressInfo.loopIndex}/${progressInfo.totalLoops} · 任务 ${progressInfo.currentIndex}/${progressInfo.totalTasks}
                    </div>
                `;
            }
        }

        /**
         * 停止训练
         */
        function stopTraining() {
            appState.isRunning = false;
            appState.isPaused = false;
            startBtn.innerHTML = SVGIcons.play;
            startBtn.classList.remove('btn-pause');
            startBtn.classList.add('btn-primary');
            
            fullscreenStartBtn.innerHTML = SVGIcons.play;
            fullscreenStartBtn.classList.remove('btn-pause');
            fullscreenStartBtn.classList.add('btn-primary');
            
            if (animationState.animationId) {
                cancelAnimationFrame(animationState.animationId);
                animationState.animationId = null;
            }
        }

        /**
         * 显示计划完成通知
         */
        function showPlanCompleteNotification() {
            const planName = planManager.getCurrentPlanName();
            
            // 使用Canvas绘制完成提示
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#10B981';
            ctx.font = 'bold 48px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('训练完成！', canvas.width / 2, canvas.height / 2 - 40);
            
            ctx.fillStyle = '#FFFFFF';
            ctx.font = '24px Inter, sans-serif';
            ctx.fillText(`"${planName}" 已全部完成`, canvas.width / 2, canvas.height / 2 + 20);
            
            ctx.font = '18px Inter, sans-serif';
            ctx.fillStyle = '#9CA3AF';
            ctx.fillText('点击开始按钮继续训练', canvas.width / 2, canvas.height / 2 + 60);
            
            playSound('complete');
        }

        // ========== 音效系统 ==========
        let audioContext = null;

        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!appState.settings.soundEnabled) return;
            
            initAudioContext();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // 根据类型设置不同的音效
            switch (type) {
                case 'start':
                    // 上升音效 (800Hz -> 400Hz)
                    oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(400, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.15);
                    break;
                    
                case 'pause':
                    // 下降音效 (400Hz -> 200Hz)
                    oscillator.frequency.setValueAtTime(400, audioContext.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.15);
                    break;
                    
                case 'switch':
                    // 方向切换音效 (600Hz 短促)
                    oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.08);
                    break;
            }
        }

        // ========== 启动应用 ==========
        init();
    </script>
